<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بەڕێوبەر - ئەپلۆدی فاتورە</title>
    <style>
        body { font-family: Arial; background: #f4f7f6; text-align: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #qrcode { margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>ناردنی فاتورە</h2>
    <input type="text" id="invNum" placeholder="ژمارەی فاتورە">
    <input type="file" id="invFile" accept="image/*">
    <button onclick="upload()">ئەپلۆد و دروستکردنی QR</button>
    <div id="status"></div>
    <canvas id="qrcode"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzNPGDAhvueWhXZlPugZ4Qj3dhdnpStokEbkrrs9ed1G6OcsLD-jc8t5o4LxoqC6Uo/exec";

    async function upload() {
        const file = document.getElementById('invFile').files[0];
        const num = document.getElementById('invNum').value;
        const status = document.getElementById('status');

        if(!file || !num) return alert("تکایە هەموو خانەکان پڕ بکەرەوە");

        status.innerText = "خەریکی ئەپلۆدکردنە...";
        const reader = new FileReader();
        reader.onload = async function(e) {
            const base64 = e.target.result;
            const res = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ type: "UPLOAD_INVOICE", image: base64, invoiceNum: num })
            });
            const data = await res.json();
            
            // دروستکردنی لێنک بۆ کڕیار
            // لێنکی GitHub Pages ەکەت لێرە دابنێ
            const clientUrl = `https://yourusername.github.io/your-repo/index.html?num=${num}&img=${encodeURIComponent(data.fileUrl)}`;
            
            new QRious({ element: document.getElementById('qrcode'), value: clientUrl, size: 200 });
            document.getElementById('qrcode').style.display = "inline-block";
            status.innerText = "سەرکەوتوو بوو! QR سکان بکە.";
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
