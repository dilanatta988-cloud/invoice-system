<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بەڕێوەبردنی فاتورەکان</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 450px; width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-qr { width: 100%; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background-color: #1a73e8; color: white; font-size: 16px; transition: 0.3s; }
        .btn-qr:hover { background-color: #1557b0; }
        #qr-result { margin-top: 20px; display: none; border-top: 1px solid #eee; padding-top: 20px; }
        #qrcode { display: inline-block; padding: 10px; background: white; }
        .btn-print { width: 100%; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background-color: #28a745; color: white; margin-top: 15px; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ناردنی فاتورە</h2>
    <input type="text" id="inv-num" placeholder="ژمارەی فاتورە بنووسە">
    <input type="file" id="inv-file" accept="image/*">
    
    <button class="btn-qr" id="process-btn" onclick="processInvoice()">دروستکردنی QR</button>
    
    <div id="qr-result">
        <p>QR کۆد بۆ کڕیار:</p>
        <div id="qrcode"></div>
        <button class="btn-print" onclick="printInvoice()">🖨 چاپکردنی فاتورە لەگەڵ QR</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypQAm8uZYxKMTMV7gOim00uk8PEyPazPa06IughIDnF0aa7-BxVJpDRY7ARFIqmw/exec";
    const BASE_URL = "https://dilanatta988-cloud.github.io/invoice-system/index.html";
    let currentImgData = "";
    let currentFinalUrl = "";

    function processInvoice() {
        const num = document.getElementById('inv-num').value;
        const fileInput = document.getElementById('inv-file');
        
        if (!num || !fileInput.files[0]) return alert("تکایە ژمارەی فاتورە و وێنەکە دیاری بکە");

        const btn = document.getElementById('process-btn');
        btn.innerText = "خەریکی کارکردنە...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.onload = function(e) {
            currentImgData = e.target.result;
            
            // ناردنی بۆ گوگل وەک پێشوو
            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ type: "UPLOAD_INVOICE", image: currentImgData, invoiceNum: num })
            });

            // دروستکردنی لێنکی کڕیار
            currentFinalUrl = `${BASE_URL}?num=${num}&img=${encodeURIComponent(currentImgData)}`;
            
            // پیشاندانی QR لەسەر شاشە
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: currentFinalUrl, width: 180, height: 180 });
            
            document.getElementById('qr-result').style.display = "block";
            btn.innerText = "دروستکردنی QR";
            btn.disabled = false;
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    function printInvoice() {
        // دروستکردنی لاپەڕەیەکی کاتی بۆ پرێنت
        const printWindow = window.open('', '_blank');
        const qrCanvas = document.querySelector('#qrcode canvas');
        const qrImage = qrCanvas.toDataURL("image/png");

        printWindow.document.write(`
            <html>
            <head>
                <title>Print Invoice</title>
                <style>
                    body { margin: 0; padding: 0; text-align: center; }
                    .wrapper { position: relative; display: inline-block; width: 100%; }
                    .invoice-img { width: 100%; height: auto; display: block; }
                    .qr-code { 
                        position: absolute; 
                        top: 20px; 
                        left: 20px; 
                        width: 120px; 
                        border: 3px solid white;
                        box-shadow: 0 0 5px rgba(0,0,0,0.2);
                    }
                </style>
            </head>
            <body>
                <div class="wrapper">
                    <img src="${currentImgData}" class="invoice-img">
                    <img src="${qrImage}" class="qr-code">
                </div>
                <script>
                    window.onload = function() { 
                        window.print(); 
                        setTimeout(function() { window.close(); }, 500);
                    };
                <\/script>
            </body>
            </html>
        `);
        printWindow.document.close();
    }
</script>

</body>
</html>
