<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Upload & Print</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; display: inline-block; width: 100%; max-width: 450px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: #1a73e8; color: white; }
        .btn-green { background: #28a745; color: white; display: none; }
        #status { margin-top: 15px; font-size: 14px; }
        #printArea { display: none; margin-top: 20px; }
        canvas { max-width: 100%; border: 1px solid #ccc; }
        
        /* شاردنەوەی هەموو شتێک لە کاتی پرنت تەنها فاتورەکە نەبێت */
        @media print {
            body * { visibility: hidden; }
            #printCanvas, #printCanvas * { visibility: visible; }
            #printCanvas { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>ناردنی فاتورە و چاپکردن</h2>
        <input type="number" id="invNum" placeholder="ژمارەی فاتورە">
        <input type="file" id="invFile" accept="image/*">
        <button id="btn" class="btn-blue" onclick="upload()">١. دروستکردنی QR</button>
        <div id="status"></div>
        
        <div id="printArea">
            <canvas id="printCanvas"></canvas>
            <button class="btn-green" id="printBtn" onclick="window.print()">٢. چاپکردنی فاتورە (Print)</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypQAm8uZYxKMTMV7gOim00uk8PEyPazPa06IughIDnF0aa7-BxVJpDRY7ARFIqmw/exec";

        async function upload() {
            const fileInput = document.getElementById('invFile');
            const file = fileInput.files[0];
            const num = document.getElementById('invNum').value;
            
            if(!file || !num) return alert("تکایە خانەکان پڕ بکەرەوە");

            document.getElementById('btn').disabled = true;
            document.getElementById('status').innerText = "خەریکی ناردن و ئامادەکردنی فاتورەیە...";

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    // ١. ناردن بۆ سێرڤەر
                    const res = await fetch(SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({ 
                            type: "UPLOAD_INVOICE", 
                            image: e.target.result, 
                            invoiceNum: num 
                        })
                    });
                    const result = await res.json();
                    
                    if(result.status === "success") {
                        const clientUrl = `https://dilanatta988-cloud.github.io/invoice-system/index.html?num=${num}&img=${encodeURIComponent(result.url)}`;
                        
                        // ٢. دروستکردنی وێنەی تێکەڵاو (فاتورە + QR)
                        generatePrintableInvoice(e.target.result, clientUrl);
                        
                        document.getElementById('status').innerHTML = "سەرکەوتوو بوو! ئێستا دەتوانی پرنتی بکەیت.";
                        document.getElementById('btn').disabled = false;
                        document.getElementById('printBtn').style.display = "block";
                        document.getElementById('printArea').style.display = "block";
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    alert("هەڵەیەک ڕوویدا: " + error.message);
                    document.getElementById('btn').disabled = false;
                }
            };
            reader.readAsDataURL(file);
        }

        function generatePrintableInvoice(base64Inv, qrUrl) {
            const canvas = document.getElementById('printCanvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            img.onload = function() {
                // قەبارەی کانڤاس وەک قەبارەی وێنە ئەسڵییەکە بێت
                canvas.width = img.width;
                canvas.height = img.height;
                
                // کێشانی فاتورەکە
                ctx.drawImage(img, 0, 0);
                
                // دروستکردنی QR لە ناو میمۆری
                const qr = new QRious({ value: qrUrl, size: 300 }); 
                const qrImg = new Image();
                
                qrImg.onload = function() {
                    // دیاریکردنی شوێنی QR (بەپێی ئەو وێنەی ناردووتە لە خوارەوە لای ڕاست گونجاوە)
                    // دەتوانی ئەم ژمارانە (200, 350) بگۆڕیت بۆ گونجاندنی شوێنەکە
                    const qrSize = canvas.width * 0.20; // قەبارەی QR %١٥ی پانی فاتورەکە بێت
                    const margin = 50;
                    const x = canvas.width - qrSize - margin;
                    const y = canvas.height - qrSize - margin;
                    
                    ctx.drawImage(qrImg, x, y, qrSize, qrSize);
                };
                qrImg.src = qr.toDataURL();
            };
            img.src = base64Inv;
        }
    </script>
</body>
</html>
