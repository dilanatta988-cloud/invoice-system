<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بەڕێوەبردنی فاتورەکان</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-qr { background-color: #1a73e8; color: white; }
        .btn-print { background-color: #28a745; color: white; display: none; }
        #qr-result { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        /* بەشی تایبەت بە پرێنت - لە شاشەدا وەک پاشبنەما دیار نابێت */
        #print-section { 
            display: none; 
            position: relative; 
            width: 210mm; /* قەبارەی A4 */
            background: white;
            margin: auto;
        }
        .invoice-preview { width: 100%; position: relative; }
        .qr-on-invoice { 
            position: absolute; 
            top: 20px;    /* لێرە دەتوانی شوێنەکەی بگۆڕی بۆ سەرەوە */
            left: 20px;   /* یان لای ڕاست و چەپ */
            width: 100px; 
            height: 100px; 
            border: 2px solid white;
            background: white;
            padding: 5px;
        }

        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #print-section { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <h2>ناردنی فاتورە</h2>
    <input type="text" id="inv-num" placeholder="ژمارەی فاتورە">
    <input type="file" id="inv-file" accept="image/*">
    
    <button class="btn-qr" onclick="processInvoice()">دروستکردنی QR و پرێنت</button>
    
    <div id="qr-result">
        <div id="qrcode"></div>
        <button class="btn-print" id="print-btn" onclick="window.print()">🖨 پرێنتکردنی فاتورە</button>
    </div>
</div>

<div id="print-section">
    <div style="position: relative; display: inline-block; width: 100%;">
        <img id="preview-img" class="invoice-preview">
        <div id="qr-overlay" class="qr-on-invoice"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypQAm8uZYxKMTMV7gOim00uk8PEyPazPa06IughIDnF0aa7-BxVJpDRY7ARFIqmw/exec";
    const BASE_URL = "https://dilanatta988-cloud.github.io/invoice-system/index.html";

    function processInvoice() {
        const num = document.getElementById('inv-num').value;
        const fileInput = document.getElementById('inv-file');
        
        if (!num || !fileInput.files[0]) return alert("تکایە هەموو زانیارییەکان پڕبکەرەوە");

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64 = e.target.result;
            
            // ناردنی بۆ گوگل درایڤ (هەمان ئیشی پێشوو)
            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ type: "UPLOAD_INVOICE", image: base64, invoiceNum: num })
            });

            // دروستکردنی لێنکی کڕیار
            const finalUrl = `${BASE_URL}?num=${num}&img=${encodeURIComponent(base64)}`;
            
            // پیشاندانی فاتورە و QR بۆ پرێنت
            document.getElementById('preview-img').src = base64;
            document.getElementById('qrcode').innerHTML = "";
            document.getElementById('qr-overlay').innerHTML = "";
            
            // دروستکردنی QR بۆ ناو لاپەڕەکە
            new QRCode(document.getElementById("qrcode"), { text: finalUrl, width: 150, height: 150 });
            
            // دروستکردنی QR بۆ سەر فاتورەکە (بۆ پرێنت)
            new QRCode(document.getElementById("qr-overlay"), { text: finalUrl, width: 100, height: 100 });

            document.getElementById('print-btn').style.display = "block";
        };
        reader.readAsDataURL(fileInput.files[0]);
    }
</script>

</body>
</html>
