<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بەڕێوەبردنی فاتورەکان - دواء الحياة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 450px; width: 100%; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #333; margin-bottom: 20px; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        .input-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-qr { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background-color: #1a73e8; color: white; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-qr:hover { background-color: #1557b0; }
        .btn-qr:disabled { background-color: #ccc; cursor: not-allowed; }
        #qr-result { margin-top: 25px; display: none; border-top: 2px dashed #eee; padding-top: 20px; }
        #qrcode { display: inline-block; padding: 15px; background: white; border: 1px solid #eee; border-radius: 10px; }
        .btn-print { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background-color: #28a745; color: white; margin-top: 15px; font-size: 16px; }
        .btn-print:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>ناردنی فاتورە</h2>
    
    <div class="input-group">
        <label>ژمارەی فاتورە:</label>
        <input type="text" id="inv-num" placeholder="بۆ نموونە: 5879">
    </div>

    <div class="input-group">
        <label>وێنەی فاتورەکە هەڵبژێرە:</label>
        <input type="file" id="inv-file" accept="image/*">
    </div>
    
    <button class="btn-qr" id="process-btn" onclick="processInvoice()">دروستکردنی QR و ئامادەکردن</button>
    
    <div id="qr-result">
        <p style="font-weight: bold; color: #1a73e8;">QR کۆد دروستکرا!</p>
        <div id="qrcode"></div>
        <button class="btn-print" onclick="printInvoice()">🖨 چاپکردنی فاتورە (کۆد لە خوارەوە)</button>
    </div>
</div>

<script>
    // --- زانیارییەکانت لێرە دابنێ ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypQAm8uZYxKMTMV7gOim00uk8PEyPazPa06IughIDnF0aa7-BxVJpDRY7ARFIqmw/exec";
    const BASE_URL = "https://dilanatta988-cloud.github.io/invoice-system/index.html";
    
    let currentImgData = "";
    let currentFinalUrl = "";

    function processInvoice() {
        const num = document.getElementById('inv-num').value;
        const fileInput = document.getElementById('inv-file');
        
        if (!num || !fileInput.files[0]) return alert("تکایە ژمارەی فاتورە و وێنەکە دیاری بکە");

        const btn = document.getElementById('process-btn');
        btn.innerText = "خەریکی بارکردنە...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.onload = function(e) {
            currentImgData = e.target.result;
            
            // ناردن بۆ Google Drive و Sheets
            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ type: "UPLOAD_INVOICE", image: currentImgData, invoiceNum: num })
            });

            // دروستکردنی لێنکی تایبەت بە کڕیار
            currentFinalUrl = `${BASE_URL}?num=${num}&img=${encodeURIComponent(currentImgData)}`;
            
            // دروستکردنی QR لەسەر شاشەی ئەدمین
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { 
                text: currentFinalUrl, 
                width: 180, 
                height: 180,
                colorDark : "#000000",
                colorLight : "#ffffff"
            });
            
            document.getElementById('qr-result').style.display = "block";
            btn.innerText = "دروستکردنی QR و ئامادەکردن";
            btn.disabled = false;
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    function printInvoice() {
        const printWindow = window.open('', '_blank');
        const qrCanvas = document.querySelector('#qrcode canvas');
        const qrImage = qrCanvas.toDataURL("image/png");
        const invNum = document.getElementById('inv-num').value;

        printWindow.document.write(`
            <html>
            <head>
                <title>Print Invoice - ${invNum}</title>
                <style>
                    body { margin: 0; padding: 40px; font-family: 'Tahoma', 'Arial', sans-serif; background: white; text-align: center; }
                    .print-wrapper { width: 100%; max-width: 900px; margin: auto; }
                    .invoice-img { width: 100%; height: auto; display: block; margin-bottom: 40px; }
                    .qr-section { 
                        margin-top: 30px; 
                        display: flex; 
                        flex-direction: column; 
                        align-items: center; 
                        border-top: 1px solid #eee;
                        padding-top: 30px;
                    }
                    .instruction { 
                        font-size: 26px; 
                        font-weight: bold; 
                        margin-bottom: 20px; 
                        direction: rtl; 
                        color: #000;
                    }
                    .qr-img { width: 200px; height: 200px; }
                </style>
            </head>
            <body>
                <div class="print-wrapper">
                    <img src="${currentImgData}" class="invoice-img">
                    
                    <div class="qr-section">
                        <div class="instruction">بۆ ئیمزاکردنی ئەلیکترۆنی ئەم کۆدە سكان بکە</div>
                        <img src="${qrImage}" class="qr-img">
                    </div>
                </div>
                <script>
                    window.onload = function() { 
                        setTimeout(function() { 
                            window.print(); 
                            window.close(); 
                        }, 700); 
                    };
                <\/script>
            </body>
            </html>
        `);
        printWindow.document.close();
    }
</script>

</body>
</html>
