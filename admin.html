<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Upload</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; display: inline-block; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #qrcode { margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>ناردنی فاتورە</h2>
        <input type="number" id="invNum" placeholder="ژمارەی فاتورە">
        <input type="file" id="invFile" accept="image/*">
        <button id="btn" onclick="upload()">دروستکردنی QR</button>
        <div id="status" style="margin-top:10px;"></div>
        <canvas id="qrcode"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzH10QLmYJjgQYnM86tyljBfKFUBjQhEHSBUaPYFazyXBCkS0rRrC4p71DHc_oQFQ/exec";

        async function upload() {
            const file = document.getElementById('invFile').files[0];
            const num = document.getElementById('invNum').value;
            if(!file || !num) return alert("خانەکان پڕ بکەرەوە");

            document.getElementById('btn').disabled = true;
            document.getElementById('status').innerText = "خەریکی ناردنە...";

            const reader = new FileReader();
            reader.onload = async (e) => {
                const res = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ type: "UPLOAD_INVOICE", image: e.target.result, invoiceNum: num })
                });
                const result = await res.json();
                
                // دروستکردنی لێنکی کڕیار بە لێنکی کورتی وێنەکە
                const clientUrl = `https://dilanatta988-cloud.github.io/invoice-system/index.html?num=${num}&img=${encodeURIComponent(result.url)}`;
                
                new QRious({ element: document.getElementById('qrcode'), value: clientUrl, size: 250 });
                document.getElementById('qrcode').style.display = "inline-block";
                document.getElementById('status').innerText = "سەرکەوتوو بوو!";
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
