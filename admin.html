<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بەڕێوبەر - ناردنی فاتورە</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; text-align: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1557b0; }
        #qrcode { margin-top: 20px; display: none; }
        #status { margin-top: 15px; font-size: 14px; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h2>ناردنی فاتورەی نوێ</h2>
    <input type="text" id="invNum" placeholder="ژمارەی فاتورە بنووسە">
    <input type="file" id="invFile" accept="image/*">
    <button onclick="upload()">ئەپلۆد و دروستکردنی QR</button>
    <div id="status"></div>
    <canvas id="qrcode"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>
    // لێنکە نوێیەکەی Apps Script
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNWxYiuNHHw9U3omUX367anrLV2BiXsSS4zu2lmTlj0uFxegasC17C5XylGYXvP8U/exec";

    async function upload() {
        const file = document.getElementById('invFile').files[0];
        const num = document.getElementById('invNum').value;
        const status = document.getElementById('status');

        if(!file || !num) return alert("تکایە هەموو خانەکان پڕ بکەرەوە");

        status.innerText = "خەریکی ئەپلۆدکردنە، چاوەڕێ بکە...";
        const reader = new FileReader();
        
        reader.onload = async function(e) {
            const base64 = e.target.result;
            
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ 
                        type: "UPLOAD_INVOICE", 
                        image: base64, 
                        invoiceNum: num 
                    })
                });
                
                const data = await res.json();
                
                // دروستکردنی لێنکی پەیجی ئیمزا بۆ کڕیار
                const clientUrl = `https://dilanatta988-cloud.github.io/invoice-system/index.html?num=${num}&img=${encodeURIComponent(data.fileUrl)}`;
                
                new QRious({ 
                    element: document.getElementById('qrcode'), 
                    value: clientUrl, 
                    size: 250 
                });
                
                document.getElementById('qrcode').style.display = "inline-block";
                status.innerText = "سەرکەوتوو بوو! کۆدەکە بدە بە کڕیار.";
            } catch (err) {
                status.innerText = "هەڵەیەک ڕوویدا لە کاتی ئەپلۆدکردن.";
            }
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
