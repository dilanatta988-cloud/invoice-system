<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>واژۆکردنی فاتورە</title>
    <style>
        body { font-family: Arial, sans-serif; background: #333; margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #box { background: white; width: 95%; max-width: 500px; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        /* ڕێگەدان بە زووم و نیشاندانی تەواوی فاتورەکە */
        .canvas-area { 
            position: relative; 
            width: 100%; 
            border: 2px solid #ddd; 
            background: #fafafa; 
            margin-bottom: 15px; 
            border-radius: 8px;
            overflow: auto; /* ڕێگەدان بە سکڕۆڵ ئەگەر زووم کرا */
        }
        
        #invoice-img { width: 100%; display: block; height: auto; }
        #signature-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; z-index: 5; }
        
        .btns { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        #loading-overlay { display: none; margin-top: 10px; color: #1a73e8; font-weight: bold; }

        /* ستایلی بەشی نووسینی خوارەوە */
        .footer-info {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
            color: #555;
            font-size: 14px;
            line-height: 1.8;
        }
        .company-name { font-weight: bold; font-size: 18px; color: #333; display: block; }
        .developer-name { font-style: italic; color: #777; }
    </style>
</head>
<body>
    <div id="box">
        <h3 style="margin-top: 0;">واژۆکردنی فاتورە</h3>
        
        <div class="canvas-area">
            <img id="invoice-img">
            <canvas id="signature-pad"></canvas>
        </div>
        
        <div id="loading-overlay">خەریکی ناردنە... تکایە چاوەڕێ بکە</div>
        
        <div class="btns">
            <button style="background:#28a745" onclick="save()">پاشەکەوتکردن</button>
            <button style="background:#dc3545" onclick="clearPad()">سڕینەوە</button>
        </div>

        <div class="footer-info">
            <span class="company-name">شەریکەی دواء الحياة</span>
            <span class="developer-name">لە لایەن ( دیلان ) دروستکراوە</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@2.3.2/dist/signature_pad.min.js"></script>
    <script>
        const canvas = document.getElementById('signature-pad');
        const img = document.getElementById('invoice-img');
        const loading = document.getElementById('loading-overlay');
        const pad = new SignaturePad(canvas, { backgroundColor: 'rgba(0,0,0,0)' });
        const urlParams = new URLSearchParams(window.location.search);
        
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypQAm8uZYxKMTMV7gOim00uk8PEyPazPa06IughIDnF0aa7-BxVJpDRY7ARFIqmw/exec";

        if (urlParams.get('img')) {
            img.crossOrigin = "anonymous";
            img.src = "https://images.weserv.nl/?url=" + encodeURIComponent(urlParams.get('img'));
            
            img.onload = () => {
                canvas.width = img.clientWidth;
                canvas.height = img.clientHeight;
            };
            
            img.onerror = () => {
                img.src = urlParams.get('img');
            };
        }

        async function save() {
            if (pad.isEmpty()) return alert("تکایە سەرەتا ئیمزا بکە");
            
            loading.style.display = "block";
            document.querySelector('.btns').style.opacity = "0.5";
            document.querySelector('.btns').style.pointerEvents = "none";

            const temp = document.createElement('canvas');
            const ctx = temp.getContext('2d');
            temp.width = img.naturalWidth;
            temp.height = img.naturalHeight;

            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, temp.width, temp.height);
            ctx.drawImage(img, 0, 0);
            ctx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, temp.width, temp.height);

            try {
                const base64Data = temp.toDataURL("image/jpeg", 0.5);

                fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    cache: "no-cache",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ 
                        type: "SAVE_FINAL", 
                        mergedImage: base64Data, 
                        invoiceNum: urlParams.get('num') 
                    })
                });

                setTimeout(() => {
                    loading.style.display = "none";
                    alert("سەرکەوتوو بوو! فاتورەکە پاشەکەوت کرا و ڕەوانە کرا.");
                    window.location.reload(); 
                }, 3000);

            } catch (err) {
                alert("هەڵە: " + err.message);
                loading.style.display = "none";
                document.querySelector('.btns').style.opacity = "1";
                document.querySelector('.btns').style.pointerEvents = "auto";
            }
        }

        function clearPad() { pad.clear(); }
        
        // ڕێگەدان بە بەکارهێنانی دوو پەنجە بۆ زووم کردن لەسەر مۆبایل
        window.addEventListener("touchstart", function(e) {
            if (e.target == canvas && e.touches.length === 1) {
                e.preventDefault(); // تەنها کاتێک یەک پەنجە بێت ڕێگری لە سکڕۆڵ دەکات (بۆ ئیمزا)
            }
        }, { passive: false });
    </script>
</body>
</html>
