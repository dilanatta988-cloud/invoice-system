<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>واژۆکردنی فاتورە</title>
    <style>
        body { font-family: Arial, sans-serif; background: #333; margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #box { background: white; width: 95%; max-width: 500px; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .canvas-area { 
            position: relative; 
            width: 100%; 
            border: 2px solid #ddd; 
            background: #fafafa; 
            margin-bottom: 15px; 
            border-radius: 8px;
            touch-action: auto !important; 
        }
        
        #invoice-img { width: 100%; display: block; height: auto; pointer-events: none; }
        #signature-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: pinch-zoom !important; z-index: 5; }
        
        .btns { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        #loading-overlay { display: none; margin-top: 10px; color: #1a73e8; font-weight: bold; }

        /* ستایلی نوێ بۆ لۆگۆ و گۆڕانکارییەکانت */
        .footer-info {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .logo-img {
            max-width: 120px; /* قەبارەی لۆگۆکە لێرە دەتوانی بگۆڕی */
            height: auto;
        }
        .created-by {
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
    <div id="box">
        <h3 style="margin-top: 0;">واژۆکردنی فاتورە</h3>
        
        <div class="canvas-area">
            <img id="invoice-img">
            <canvas id="signature-pad"></canvas>
        </div>
        
        <div id="loading-overlay">خەریکی ناردنە... تکایە چاوەڕێ بکە</div>
        
        <div class="btns">
            <button style="background:#28a745" onclick="save()">پاشەکەوتکردن</button>
            <button style="background:#dc3545" onclick="clearPad()">سڕینەوە</button>
        </div>

        <div class="footer-info">
            <img src="A.jpg" alt="Dawa Alhayat" class="logo-img">
            <div class="created-by"> Created by Dilan</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@2.3.2/dist/signature_pad.min.js"></script>
    <script>
        const canvas = document.getElementById('signature-pad');
        const img = document.getElementById('invoice-img');
        const loading = document.getElementById('loading-overlay');
        const pad = new SignaturePad(canvas, { backgroundColor: 'rgba(0,0,0,0)' });
        const urlParams = new URLSearchParams(window.location.search);
        
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyzkLSyfpXhcrHikk_R5T2y5LiBu5KDNfBdQ-yotruhkhqXJOzjO7vyxUD7pl9aII/exec";

        if (urlParams.get('img')) {
            img.crossOrigin = "anonymous";
            img.src = "https://images.weserv.nl/?url=" + encodeURIComponent(urlParams.get('img'));
            img.onload = () => {
                canvas.width = img.clientWidth;
                canvas.height = img.clientHeight;
            };
            img.onerror = () => { img.src = urlParams.get('img'); };
        }

        // ڕێکخستنی زووم بە دوو پەنجە
        canvas.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) { pad.off(); } else { pad.on(); }
        }, { passive: true });

        canvas.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) { pad.off(); }
        }, { passive: true });

        async function save() {
            if (pad.isEmpty()) return alert("تکایە سەرەتا ئیمزا بکە");
            loading.style.display = "block";
            
            const temp = document.createElement('canvas');
            const ctx = temp.getContext('2d');
            temp.width = img.naturalWidth;
            temp.height = img.naturalHeight;
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, temp.width, temp.height);
            ctx.drawImage(img, 0, 0);
            ctx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, temp.width, temp.height);

            try {
                const base64Data = temp.toDataURL("image/jpeg", 0.5);
                fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    body: JSON.stringify({ 
                        type: "SAVE_FINAL", 
                        mergedImage: base64Data, 
                        invoiceNum: urlParams.get('num') 
                    })
                });

                setTimeout(() => {
                    loading.style.display = "none";
                    alert("سەرکەوتوو بوو!");
                    window.location.reload(); 
                }, 3000);
            } catch (err) {
                alert("هەڵە: " + err.message);
                loading.style.display = "none";
            }
        }

        function clearPad() { pad.clear(); }
    </script>
</body>
</html>
