<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>واژۆکردنی فاتورە</title>
    <style>
        body { font-family: Arial, sans-serif; background: #333; margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #box { background: white; width: 95%; max-width: 500px; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* کامێراکە لێرە شاراوەیە */
        #camera-container { width: 1px; height: 1px; opacity: 0; overflow: hidden; position: absolute; }
        
        .status-msg { background: #e8f0fe; color: #1a73e8; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; border: 1px solid #d2e3fc; }
        
        .canvas-area { 
            position: relative; 
            width: 100%; 
            border: 2px solid #ddd; 
            background: #fafafa; 
            margin-bottom: 15px; 
            border-radius: 8px;
            touch-action: auto !important; 
        }
        
        #invoice-img { width: 100%; display: block; height: auto; pointer-events: none; }
        #signature-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: pinch-zoom !important; z-index: 5; }
        
        .btns { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        #loading-overlay { display: none; margin-top: 10px; color: #1a73e8; font-weight: bold; }

        .footer-info {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .logo-img { max-width: 120px; height: auto; }
        .created-by { font-size: 12px; color: #888; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="box">
        <h3 style="margin: 0 0 10px 0;">واژۆکردنی فاتورە</h3>
        
        <div class="status-msg">
            ⚠️ بۆ دڵنیایی زیاتر و پاراستنی مافی هەردوولا، وێنەی کڕیار و لۆکەیشن تۆمار دەکرێت.
        </div>

        <div id="camera-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="photo-canvas"></canvas>
        </div>

        <div class="canvas-area">
            <img id="invoice-img">
            <canvas id="signature-pad"></canvas>
        </div>
        
        <div id="loading-overlay">خەریکی ناردنی زانیارییەکانە...</div>
        
        <div class="btns">
            <button style="background:#28a745" onclick="saveAll()">پاشەکەوتکردن</button>
            <button style="background:#dc3545" onclick="clearPad()">سڕینەوە</button>
        </div>

        <div class="footer-info">
            <img src="A.jpg" alt="Dawa Alhayat" class="logo-img">
            <div class="created-by">Created by Dilan</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@2.3.2/dist/signature_pad.min.js"></script>
    <script>
        const canvas = document.getElementById('signature-pad');
        const img = document.getElementById('invoice-img');
        const loading = document.getElementById('loading-overlay');
        const video = document.getElementById('webcam');
        const pad = new SignaturePad(canvas, { backgroundColor: 'rgba(0,0,0,0)' });
        const urlParams = new URLSearchParams(window.location.search);
        
        let currentCoords = "نەزانراو";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzZnKDtqaypizGbqob_Vhsbq9wRu8cHZThmyZlCkBVfNX3J_DOUh82HfFOIp_enT9Y/exec";

        // دەستپێکردنی کامێرا (بە شاراوەیی)
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => console.log("Camera access denied"));

        // وەرگرتنی لۆکەیشن
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                currentCoords = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            }, err => console.log("Location denied"), { enableHighAccuracy: true });
        }

        if (urlParams.get('img')) {
            img.crossOrigin = "anonymous";
            img.src = "https://images.weserv.nl/?url=" + encodeURIComponent(urlParams.get('img'));
            img.onload = () => {
                canvas.width = img.clientWidth;
                canvas.height = img.clientHeight;
            };
        }

        async function saveAll() {
            if (pad.isEmpty()) return alert("تکایە سەرەتا ئیمزا بکە");
            
            // داوای ڕێگەدان بە لۆکەیشن ئەگەر پێشتر نەکرابێت
            if(currentCoords === "نەزانراو") {
                alert("تکایە ڕێگە بە لۆکەیشن بدە بۆ تەواوکردنی پرۆسەکە");
                return;
            }

            loading.style.display = "block";
            
            // گرتنی وێنەکە لە پشتەوە
            const photoCanvas = document.getElementById('photo-canvas');
            photoCanvas.width = video.videoWidth || 640;
            photoCanvas.height = video.videoHeight || 480;
            photoCanvas.getContext('2d').drawImage(video, 0, 0);
            const selfieBase64 = photoCanvas.toDataURL("image/jpeg", 0.5);

            // تێکەڵکردنی فاتورە و ئیمزا
            const temp = document.createElement('canvas');
            const ctx = temp.getContext('2d');
            temp.width = img.naturalWidth;
            temp.height = img.naturalHeight;
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, temp.width, temp.height);
            ctx.drawImage(img, 0, 0);
            ctx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, temp.width, temp.height);
            const finalInvoiceBase64 = temp.toDataURL("image/jpeg", 0.5);

            try {
                fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    body: JSON.stringify({ 
                        type: "SAVE_FINAL", 
                        mergedImage: finalInvoiceBase64,
                        selfie: selfieBase64,
                        location: currentCoords,
                        invoiceNum: urlParams.get('num') 
                    })
                });

                setTimeout(() => {
                    loading.style.display = "none";
                    alert("سوپاس! واژۆکەت بە سەرکەوتوویی تۆمار کرا.");
                    window.location.reload(); 
                }, 3500);
            } catch (err) {
                alert("هەڵەیەک ڕوویدا، دووبارە هەوڵ بدەرەوە");
                loading.style.display = "none";
            }
        }

        function clearPad() { pad.clear(); }
    </script>
</body>
</html>
