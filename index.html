<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Signature Pad - Dilan</title>
    <style>
        body { background: #0072ff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        #pad-container { background: white; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; height: 90vh; display: flex; flex-direction: column; }
        .wrapper { position: relative; flex-grow: 1; border: 1px solid #ccc; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; touch-action: none; }
        #inv-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 5; }
        button { width: 48%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="pad-container">
        <h2 style="color:#333">Sign Invoice</h2>
        <div class="wrapper">
            <img id="inv-img">
            <canvas id="signature-pad"></canvas>
        </div>
        <div style="display:flex; justify-content: space-between;">
            <button style="background:#28a745" onclick="save()">Save</button>
            <button style="background:#ff7f50" onclick="signaturePad.clear()">Clear</button>
        </div>
        <p style="color:#666; margin-top:10px;">Created by Dilan</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@2.3.2/dist/signature_pad.min.js"></script>
    <script>
        const canvas = document.getElementById('signature-pad');
        const invImg = document.getElementById('inv-img');
        const signaturePad = new SignaturePad(canvas);

        const urlParams = new URLSearchParams(window.location.search);
        const imgData = urlParams.get('img');
        const invNum = urlParams.get('num');

        if (imgData) {
            invImg.src = decodeURIComponent(imgData);
            invImg.onload = resize;
        }

        function resize() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }

        function save() {
            if (signaturePad.isEmpty()) return alert("Please sign first");

            const tempCanvas = document.createElement('canvas');
            const ctx = tempCanvas.getContext('2d');
            tempCanvas.width = invImg.naturalWidth;
            tempCanvas.height = invImg.naturalHeight;

            // کێشانی فاتورە و پاشبنەمای سپی
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            ctx.drawImage(invImg, 0, 0);
            ctx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);

            const dataURL = tempCanvas.toDataURL("image/jpeg", 0.7);

            fetch("https://script.google.com/macros/s/AKfycbzH10QLmYJjgQYnM86tyljBfKFUBjQhEHSBUaPYFazyXBCkS0rRrC4p71DHc_oQFQ/exec", {
                method: "POST",
                mode: "no-cors", // وەک کۆدەکەی خۆت
                body: JSON.stringify({ 
                    type: "SAVE_FINAL", 
                    mergedImage: dataURL, 
                    invoiceNum: invNum 
                })
            }).then(() => {
                alert("Done!");
                signaturePad.clear();
            });
        }
        window.onresize = resize;
    </script>
</body>
</html>
