<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی واژۆی ئەلیکترۆنی</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        canvas { border: 2px solid #333; border-radius: 5px; background: #fff; cursor: crosshair; touch-action: none; width: 100%; max-width: 400px; height: 200px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-family: 'Tahoma'; font-size: 14px; }
        button { background-color: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; font-family: 'Tahoma'; transition: 0.3s; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        h2 { color: #333; }
        .info-label { display: block; text-align: right; margin-right: 5%; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>واژۆکردنی فاتورە</h2>
    
    <label class="info-label">ناوی تەواو:</label>
    <input type="text" id="custName" placeholder="ناوی خۆت بنووسە...">
    
    <label class="info-label">ڕەقەمی مۆبایل:</label>
    <input type="tel" id="custPhone" placeholder="0750XXXXXXX">

    <hr>
    
    <label class="info-label">واژۆ لێرە بکە:</label>
    <canvas id="signature-pad"></canvas>
    <br>
    <button onclick="clearCanvas()" style="background-color: #dc3545; padding: 8px 15px; margin-top: 5px; font-size: 12px;">سڕینەوەی واژۆ</button>
    
    <br><br>
    <button id="saveBtn" onclick="saveInvoice()">پاشەکەوتکردن و ناردن</button>
</div>

<script>
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // ڕێکخستنی قەبارەی کانڤاس
    canvas.width = 400;
    canvas.height = 200;
    ctx.lineWidth = 3;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#000';

    // وەرگرتنی ژمارەی فاتورە لە لێنکەکە (بۆ نموونە ?inv=1001)
    const urlParams = new URLSearchParams(window.location.search);
    const currentInvNum = urlParams.get('inv') || "بەردەست نییە";

    // کردارەکانی کێشان (Mouse & Touch)
    function startDrawing(e) { drawing = true; draw(e); }
    function stopDrawing() { drawing = false; ctx.beginPath(); }
    
    function draw(e) {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;
        
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
    canvas.addEventListener('touchend', stopDrawing);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function saveInvoice() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const saveBtn = document.getElementById('saveBtn');

        // پشکنینی ناو و مۆبایل
        if (!name || !phone) {
            alert("تکایە ناو و مۆبایلەکەت بنووسە پێش ئەوەی واژۆ بکەیت.");
            return;
        }

        // پشکنینی ئەوەی کە ئایا واژۆی کردووە (بەراوردکردنی کانڤاسە بەتاڵەکە)
        const blank = document.createElement('canvas');
        blank.width = canvas.width;
        blank.height = canvas.height;
        if (canvas.toDataURL() === blank.toDataURL()) {
            alert("تکایە سەرەتا واژۆ بکە.");
            return;
        }

        // دەستپێکردنی لۆدینگ
        saveBtn.innerText = "خەریکی ناردنە... تکایە چاوەڕێ بکە";
        saveBtn.disabled = true;

        const payload = {
            type: "SAVE_FINAL",
            invoiceNum: currentInvNum,
            mergedImage: canvas.toDataURL("image/jpeg"),
            customerName: name,
            customerPhone: phone
        };

        // --- لێرە لێنکی ویب ئەپەکەی گوگل دابنێ ---
        const scriptURL = "https://script.google.com/macros/s/AKfycbw5gHr_OeDAcmeJiTp7WiFXH5ZvuM22LIvFVMqioCUuNN20as9QoomiYGjP5nHk09M/exec";

        fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                alert("واژۆکەت بە سەرکەوتوویی پاشەکەوت کرا و بۆ کاک دیلان نێردرا.");
                clearCanvas();
                document.getElementById('custName').value = "";
                document.getElementById('custPhone').value = "";
            } else {
                alert("هەڵەیەک ڕوویدا: " + data.message);
            }
        })
        .catch(err => {
            alert("کێشەیەک لە پەیوەندی ئینتەرنێتەکەتدا هەیە.");
            console.error(err);
        })
        .finally(() => {
            saveBtn.innerText = "پاشەکەوتکردن و ناردن";
            saveBtn.disabled = false;
        });
    }
</script>

</body>
</html>
