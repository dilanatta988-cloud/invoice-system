<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>ئیمزاکردنی فاتورە</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; font-family: Arial; background: #333; overflow: hidden; }
        #container { background: white; padding: 15px; width: 95%; max-width: 500px; height: 90vh; border-radius: 12px; display: flex; flex-direction: column; }
        .canvas-wrapper { position: relative; flex-grow: 1; border: 1px solid #ccc; background: #fff; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; touch-action: none; }
        #invoice-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 5; }
        .btns { display: flex; justify-content: space-between; margin-top: 10px; }
        button { width: 48%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="container">
        <h3 style="text-align:center; margin-bottom:10px;">تکایە ئیمزا بکە</h3>
        <div class="canvas-wrapper">
            <img id="invoice-img">
            <canvas id="signature-pad"></canvas>
        </div>
        <div class="btns">
            <button style="background:#28a745;" onclick="save()">ناردنی ئیمزا</button>
            <button style="background:#dc3545;" onclick="clearPad()">سڕینەوە</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@2.3.2/dist/signature_pad.min.js"></script>
    <script>
        const canvas = document.getElementById('signature-pad');
        const invoiceImg = document.getElementById('invoice-img');
        const signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgba(0,0,0,0)' });

        const urlParams = new URLSearchParams(window.location.search);
        const imgData = urlParams.get('img');
        const invNum = urlParams.get('num');

        if (imgData) {
            invoiceImg.src = decodeURIComponent(imgData);
            invoiceImg.onload = () => resize();
        }

        function resize() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }

        function save() {
            if (signaturePad.isEmpty()) return alert("تکایە ئیمزا بکە");

            const tempCanvas = document.createElement('canvas');
            const ctx = tempCanvas.getContext('2d');
            tempCanvas.width = invoiceImg.naturalWidth;
            tempCanvas.height = invoiceImg.naturalHeight;

            // گرنگ: کێشانی پاشبنەمای سپی بۆ ئەوەی ڕەش دەرنەچێت
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            ctx.drawImage(invoiceImg, 0, 0);
            ctx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);

            const finalImg = tempCanvas.toDataURL("image/jpeg", 0.6);
            
            alert("خەریکی ناردنە...");
            fetch("https://script.google.com/macros/s/AKfycbyWW3AbZjTSrMIglLDyodcMfHSbL8iJqkzU9csJzsX9Ys0albjGx4mPYuOD2gD-rS8/exec", {
                method: "POST",
                body: JSON.stringify({ type: "SAVE_FINAL", mergedImage: finalImg, invoiceNum: invNum })
            }).then(() => alert("سەرکەوتوو بوو!")).catch(() => alert("هەڵە ڕوویدا"));
        }

        function clearPad() { signaturePad.clear(); }
        window.onresize = resize;
    </script>
</body>
</html>
