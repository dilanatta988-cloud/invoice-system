<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>ئیمزاکردنی فاتورە</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #container { background: white; width: 95%; max-width: 500px; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); text-align: center; }
        .canvas-container { position: relative; width: 100%; border: 2px solid #ddd; background: #eee; margin-bottom: 15px; overflow: hidden; border-radius: 8px; }
        #invoice-img { width: 100%; display: block; }
        #signature-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; z-index: 5; }
        .btns { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; }
        .save { background: #28a745; }
        .clear { background: #ff7675; }
    </style>
</head>
<body>

<div id="container">
    <h2 style="margin-bottom: 15px;">Sign Invoice</h2>
    <div class="canvas-container" id="canvas-holder">
        <img id="invoice-img">
        <canvas id="signature-pad"></canvas>
    </div>
    <div class="btns">
        <button class="save" onclick="save()">Save</button>
        <button class="clear" onclick="clearPad()">Clear</button>
    </div>
    <p style="margin-top: 10px; color: #777;">Created by Dilan</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@2.3.2/dist/signature_pad.min.js"></script>
<script>
    const canvas = document.getElementById('signature-pad');
    const invoiceImg = document.getElementById('invoice-img');
    const signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgba(0,0,0,0)' });

    const urlParams = new URLSearchParams(window.location.search);
    const imgData = urlParams.get('img');
    const invNum = urlParams.get('num');

    if (imgData) {
        invoiceImg.src = decodeURIComponent(imgData);
        invoiceImg.onload = function() {
            // ڕێکخستنی قەبارەی کانڤاس ڕێک بەقەد وێنەکە
            canvas.width = invoiceImg.clientWidth;
            canvas.height = invoiceImg.clientHeight;
            signaturePad.clear();
        };
    }

    async function save() {
        if (signaturePad.isEmpty()) return alert("تکایە ئیمزا بکە");

        const tempCanvas = document.createElement('canvas');
        const ctx = tempCanvas.getContext('2d');
        
        // بەکارهێنانی قەبارەی ئەسڵی وێنەکە بۆ ئەوەی کوالێتی بەرز بێت
        tempCanvas.width = invoiceImg.naturalWidth;
        tempCanvas.height = invoiceImg.naturalHeight;

        // ١. سپیکردنی پاشبنەما (بۆ ئەوەی وێنەکە ڕەش نەبێت لە درایڤ)
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

        // ٢. کێشانی فاتورە ئەسڵییەکە
        ctx.drawImage(invoiceImg, 0, 0);

        // ٣. کێشانی ئیمزاکە (بە قەبارەی گونجاو)
        ctx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, tempCanvas.width, tempCanvas.height);

        const finalImg = tempCanvas.toDataURL("image/jpeg", 0.8);
        
        alert("خەریکی ناردنە، تکایە چاوەڕێ بکە...");
        
        fetch("https://script.google.com/macros/s/AKfycbzH10QLmYJjgQYnM86tyljBfKFUBjQhEHSBUaPYFazyXBCkS0rRrC4p71DHc_oQFQ/exec", {
            method: "POST",
            mode: 'no-cors', // گرنگ بۆ ئایفۆن
            body: JSON.stringify({ type: "SAVE_FINAL", mergedImage: finalImg, invoiceNum: invNum })
        }).then(() => {
            alert("سەرکەوتوو بوو! فاتورەکە پاشەکەوت کرا.");
            signaturePad.clear();
        }).catch(() => alert("هەڵە لە ناردن"));
    }

    function clearPad() { signaturePad.clear(); }
    
    // نوێکردنەوەی قەبارە ئەگەر شاشە سوڕێنرا
    window.onresize = () => {
        canvas.width = invoiceImg.clientWidth;
        canvas.height = invoiceImg.clientHeight;
    };
</script>

</body>
</html>
