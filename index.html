<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی واژۆی فەرمی - Dawa Al-Hayat</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background: #f4f7f6; padding: 15px; text-align: center; color: #333; }
        .main-card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-family: 'Tahoma'; }
        video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 10px; }
        canvas { width: 100%; border: 2px solid #eee; border-radius: 10px; background: #fff; touch-action: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-camera { background: #34a853; color: white; }
        .btn-save { background: #1a73e8; color: white; font-size: 18px; }
        .btn:disabled { background: #ccc; }
        #preview-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 10px auto; display: none; border: 3px solid #34a853; }
    </style>
</head>
<body>

<div class="main-card">
    <h2 style="color: #1a73e8;">واژۆی وەرگرتنی مەواد</h2>
    
    <input type="text" id="custName" placeholder="ناوی تەواوی وەرگر">
    <input type="tel" id="custPhone" placeholder="ڕەقەمی مۆبایل">

    <div style="background: #eef2f7; padding: 10px; border-radius: 10px; margin-top: 10px;">
        <p style="margin: 0 0 10px 0; font-size: 14px; font-weight: bold;">هەنگاوی ١: وێنەی وەرگر (سێڵفی)</p>
        <video id="video" autoplay playsinline></video>
        <img id="preview-img">
        <button class="btn btn-camera" onclick="takePhoto()">📷 گرتنی وێنەی سێڵفی</button>
    </div>

    <div style="margin-top: 20px;">
        <p style="margin: 0 0 10px 0; font-size: 14px; font-weight: bold;">هەنگاوی ٢: واژۆ لێرە بکە</p>
        <canvas id="sig-canvas" height="180"></canvas>
        <button onclick="clearSig()" style="background:none; border:none; color:red; cursor:pointer; font-size: 12px;">سڕینەوەی واژۆ</button>
    </div>

    <button class="btn btn-save" id="saveBtn" onclick="submitData()">پاشەکەوتکردن و ناردنی فەرمی</button>
</div>

<script>
    const video = document.getElementById('video');
    const sigCanvas = document.getElementById('sig-canvas');
    const sCtx = sigCanvas.getContext('2d');
    let capturedPhoto = null;
    let drawing = false;

    // ڕێکخستنی کامێرا
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { video.srcObject = stream; })
        .catch(() => alert("تکایە ڕێگە بدە بە کامێراکەت"));

    function takePhoto() {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        tempCanvas.getContext('2d').drawImage(video, 0, 0);
        capturedPhoto = tempCanvas.toDataURL('image/jpeg', 0.6);
        document.getElementById('preview-img').src = capturedPhoto;
        document.getElementById('preview-img').style.display = 'block';
        video.style.display = 'none';
        alert("وێنەکە بە سەرکەوتوویی گیرا");
    }

    // کۆدی واژۆکردن
    sigCanvas.width = sigCanvas.offsetWidth;
    sCtx.lineWidth = 3;
    sCtx.lineCap = 'round';
    sCtx.strokeStyle = '#000';

    function getPos(e) {
        const rect = sigCanvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    sigCanvas.addEventListener('mousedown', (e) => { drawing = true; const p = getPos(e); sCtx.moveTo(p.x, p.y); });
    sigCanvas.addEventListener('mousemove', (e) => { 
        if(!drawing) return; 
        const p = getPos(e); 
        sCtx.lineTo(p.x, p.y); 
        sCtx.stroke(); 
    });
    window.addEventListener('mouseup', () => { drawing = false; sCtx.beginPath(); });

    sigCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; const p = getPos(e); sCtx.moveTo(p.x, p.y); });
    sigCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(!drawing) return; const p = getPos(e); sCtx.lineTo(p.x, p.y); sCtx.stroke(); });
    sigCanvas.addEventListener('touchend', () => { drawing = false; sCtx.beginPath(); });

    function clearSig() { sCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height); }

    function submitData() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const saveBtn = document.getElementById('saveBtn');

        if(!name || !phone || !capturedPhoto) {
            alert("تکایە ناو، مۆبایل و وێنەی سێڵفی تەواو بکە.");
            return;
        }

        saveBtn.disabled = true;
        saveBtn.innerText = "خەریکی وەرگرتنی لۆکەیشن و ناردنە...";

        navigator.geolocation.getCurrentPosition((pos) => {
            const payload = {
                type: "SAVE_FINAL",
                invoiceNum: new URLSearchParams(window.location.search).get('inv') || "بەردەست نییە",
                customerName: name,
                customerPhone: phone,
                location: pos.coords.latitude + "," + pos.coords.longitude,
                userPhoto: capturedPhoto,
                mergedImage: sigCanvas.toDataURL('image/jpeg')
            };

            const scriptURL = "https://script.google.com/macros/s/AKfycbxR0gmRodWofvZJ0yiGx5AZRofOKUvgp69UylOnx4ohFU0BiN5FTlg1YJUAVw3_xDY/exec";

            fetch(scriptURL, { method: "POST", body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(data => {
                alert("واژۆ و زانیارییەکان بە سەرکەوتوویی نێردران.");
                location.reload();
            })
            .catch(err => {
                alert("هەڵە ڕوویدا لە ناردن. ئینتەرنێتەکەت بپشکنە.");
                saveBtn.disabled = false;
            });

        }, () => {
            alert("هەڵە: دەبێت GPS چالاک بکەیت بۆ ئەوەی واژۆکەت قبوڵ بکرێت.");
            saveBtn.disabled = false;
            saveBtn.innerText = "پاشەکەوتکردن و ناردنی فەرمی";
        });
    }
</script>

</body>
</html>
