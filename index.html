<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>ئیمزاکردنی فاتورە - Panacea System</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #container { background: white; width: 95%; max-width: 500px; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); text-align: center; }
        .canvas-container { position: relative; width: 100%; border: 2px solid #ddd; background: #eee; margin-bottom: 15px; border-radius: 8px; overflow: hidden; }
        #invoice-img { width: 100%; display: block; pointer-events: none; }
        #signature-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; z-index: 10; }
        .btns { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; transition: 0.3s; }
        .save { background: #28a745; }
        .save:disabled { background: #ccc; }
        .clear { background: #ff7675; }
        #loader { display: none; margin-top: 10px; color: #1a73e8; font-weight: bold; }
    </style>
</head>
<body>

<div id="container">
    <h2 style="margin-bottom: 15px;">Sign Invoice</h2>
    <div class="canvas-container">
        <img id="invoice-img" crossorigin="anonymous">
        <canvas id="signature-pad"></canvas>
    </div>
    <div id="loader">خەریکی ناردنە، تکایە کەمێک چاوەڕێ بکە...</div>
    <div class="btns">
        <button id="save-btn" class="save" onclick="save()">Save</button>
        <button class="clear" onclick="clearPad()">Clear</button>
    </div>
    <p style="margin-top: 10px; color: #777; font-size: 12px;">Dilan Radha - Warehouse Manager</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@2.3.2/dist/signature_pad.min.js"></script>
<script>
    const canvas = document.getElementById('signature-pad');
    const invoiceImg = document.getElementById('invoice-img');
    const saveBtn = document.getElementById('save-btn');
    const loader = document.getElementById('loader');
    const signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgba(0,0,0,0)' });

    const urlParams = new URLSearchParams(window.location.search);
    const imgData = urlParams.get('img');
    const invNum = urlParams.get('num');
    
    // لێنکە نوێیەکەت لێرە جێگیر کرا
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypQAm8uZYxKMTMV7gOim00uk8PEyPazPa06IughIDnF0aa7-BxVJpDRY7ARFIqmw/exec";

    if (imgData) {
        // نیشاندانی وێنەکە لە ڕێگەی پرۆکسی بۆ ئەوەی لە ئایفۆن بێ کێشە بێت
        invoiceImg.src = "https://images.weserv.nl/?url=" + encodeURIComponent(decodeURIComponent(imgData));
        invoiceImg.onload = function() {
            canvas.width = invoiceImg.clientWidth;
            canvas.height = invoiceImg.clientHeight;
            signaturePad.clear();
        };
    }

    async function save() {
        if (signaturePad.isEmpty()) return alert("تکایە سەرەتا ئیمزا بکە");

        saveBtn.disabled = true;
        loader.style.display = "block";

        const tempCanvas = document.createElement('canvas');
        const ctx = tempCanvas.getContext('2d');
        
        // بچووککردنەوەی وێنە بۆ 800px بۆ ئەوەی ئایفۆن بە خێرایی بینێرێت
        const maxWidth = 800;
        const scale = maxWidth / invoiceImg.naturalWidth;
        tempCanvas.width = maxWidth;
        tempCanvas.height = invoiceImg.naturalHeight * scale;

        // پاشبنەمای سپی بۆ ئەوەی لە درایڤ ڕەش نەبێت
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
        
        ctx.drawImage(invoiceImg, 0, 0, tempCanvas.width, tempCanvas.height);
        ctx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, tempCanvas.width, tempCanvas.height);

        // کوالێتی 0.5 بۆ هاوسەنگی نێوان جوانی و خێرایی
        const finalImg = tempCanvas.toDataURL("image/jpeg", 0.5);

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: 'no-cors', // ڕێگری لە بلۆککردنی ناردن لەلایەن براوزەری مۆبایلەوە
                body: JSON.stringify({ 
                    type: "SAVE_FINAL", 
                    mergedImage: finalImg, 
                    invoiceNum: invNum 
                })
            });

            // چونکە no-cors بەکاردێت، ٣ چرکە چاوەڕێ دەکەین و پاشان نامەی سەرکەوتن دەدەین
            setTimeout(() => {
                alert("سەرکەوتوو بوو! زانیارییەکان لە شیت و وێنەکە لە درایڤ پاشەکەوت کران.");
                loader.style.display = "none";
                saveBtn.disabled = false;
                signaturePad.clear();
            }, 3000);

        } catch (err) {
            alert("هەڵەیەک ڕوویدا لە کاتی پەیوەندی بە سێرڤەر. تکایە جارێکی تر تاقی بکەرەوە.");
            saveBtn.disabled = false;
            loader.style.display = "none";
        }
    }

    function clearPad() { signaturePad.clear(); }
    
    window.onresize = () => {
        canvas.width = invoiceImg.clientWidth;
        canvas.height = invoiceImg.clientHeight;
    };
</script>

</body>
</html>
