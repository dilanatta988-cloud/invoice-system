<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>واژۆکردنی فاتورە</title>
    <style>
        body { font-family: Arial, sans-serif; background: #333; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #box { background: white; width: 95%; max-width: 450px; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .canvas-area { position: relative; width: 100%; border: 2px solid #ddd; background: #fafafa; margin-bottom: 15px; overflow: hidden; border-radius: 8px; }
        #invoice-img { width: 100%; display: block; }
        #signature-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; z-index: 5; }
        .btns { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        #loading-overlay { display: none; margin-top: 10px; color: #1a73e8; font-weight: bold; }
    </style>
</head>
<body>
    <div id="box">
        <h3 style="margin-top: 0;">واژۆکردنی فاتورە</h3>
        <div class="canvas-area">
            <img id="invoice-img">
            <canvas id="signature-pad"></canvas>
        </div>
        <div id="loading-overlay">خەریکی ناردنە... تکایە چاوەڕێ بکە</div>
        <div class="btns">
            <button style="background:#28a745" onclick="save()">ناردن</button>
            <button style="background:#dc3545" onclick="clearPad()">سڕینەوە</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@2.3.2/dist/signature_pad.min.js"></script>
    <script>
        const canvas = document.getElementById('signature-pad');
        const img = document.getElementById('invoice-img');
        const loading = document.getElementById('loading-overlay');
        const pad = new SignaturePad(canvas, { backgroundColor: 'rgba(0,0,0,0)' });
        const urlParams = new URLSearchParams(window.location.search);
        
        // لێنکی Apps Script لێرە دابنێ
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypQAm8uZYxKMTMV7gOim00uk8PEyPazPa06IughIDnF0aa7-BxVJpDRY7ARFIqmw/exec";

        // چارەسەری هەڵەی SecurityError / Tainted Canvas
        if (urlParams.get('img')) {
            img.crossOrigin = "anonymous"; // زۆر گرنگە بۆ ناردنی وێنەکە
            
            // بەکارهێنانی پرۆکسی بۆ ئەوەی ڕێگری لە 'Canvas Export' نەکرێت
            img.src = "https://images.weserv.nl/?url=" + encodeURIComponent(urlParams.get('img'));
            
            img.onload = () => {
                canvas.width = img.clientWidth;
                canvas.height = img.clientHeight;
            };
            
            img.onerror = () => {
                // ئەگەر پرۆکسییەکە کاری نەکرد، ڕاستەوخۆ لێنکەکە تاقی دەکاتەوە
                img.src = urlParams.get('img');
            };
        }

        async function save() {
            if (pad.isEmpty()) return alert("تکایە سەرەتا ئیمزا بکە");
            
            loading.style.display = "block";
            document.querySelector('.btns').style.opacity = "0.5";
            document.querySelector('.btns').style.pointerEvents = "none";

            const temp = document.createElement('canvas');
            const ctx = temp.getContext('2d');
            temp.width = img.naturalWidth;
            temp.height = img.naturalHeight;

            // دروستکردنی وێنە تێکەڵەکە
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, temp.width, temp.height);
            ctx.drawImage(img, 0, 0);
            ctx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, temp.width, temp.height);

            try {
                const base64Data = temp.toDataURL("image/jpeg", 0.5); // کەمکردنەوەی قەبارە

                // ناردن بۆ گوگل بە بێ چاوەڕێکردنی وەڵام (بۆ ڕێگریکردن لە وەستان لە GitHub)
                fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    cache: "no-cache",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ 
                        type: "SAVE_FINAL", 
                        mergedImage: base64Data, 
                        invoiceNum: urlParams.get('num') 
                    })
                });

                // چونکە no-cors بەکاردێنین، دوای 3 چرکە یەکسەر پەیامی سەرکەوتوو دەدەین
                setTimeout(() => {
                    loading.style.display = "none";
                    alert("سەرکەوتوو بوو! فاتورەکە پاشەکەوت کرا و ڕەوانە کرا.");
                    window.location.reload(); 
                }, 3000);

            } catch (err) {
                alert("هەڵە لە کاتی کۆنترۆڵکردنی وێنە: " + err.message);
                loading.style.display = "none";
                document.querySelector('.btns').style.opacity = "1";
                document.querySelector('.btns').style.pointerEvents = "auto";
            }
        }

        function clearPad() { pad.clear(); }
        
        window.addEventListener("touchstart", function(e) {
            if (e.target == canvas) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
