<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>ئیمزا</title>
    <style>
        body { font-family: Arial; background: #333; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #box { background: white; width: 95%; max-width: 450px; padding: 15px; border-radius: 15px; text-align: center; }
        .canvas-area { position: relative; width: 100%; border: 1px solid #ccc; background: #fafafa; margin-bottom: 10px; }
        #invoice-img { width: 100%; display: block; }
        #signature-pad { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; z-index: 5; }
        .btns { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="box">
        <h3>Sign Invoice</h3>
        <div class="canvas-area">
            <img id="invoice-img">
            <canvas id="signature-pad"></canvas>
        </div>
        <div class="btns">
            <button style="background:#28a745" onclick="save()">Save</button>
            <button style="background:#dc3545" onclick="clearPad()">Clear</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@2.3.2/dist/signature_pad.min.js"></script>
    <script>
        const canvas = document.getElementById('signature-pad');
        const img = document.getElementById('invoice-img');
        const pad = new SignaturePad(canvas, { backgroundColor: 'rgba(0,0,0,0)' });
        const urlParams = new URLSearchParams(window.location.search);
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypQAm8uZYxKMTMV7gOim00uk8PEyPazPa06IughIDnF0aa7-BxVJpDRY7ARFIqmw/exec";

        if (urlParams.get('img')) {
            // بەکارهێنانی سێرڤەری ناوبژیوان (Proxy) بۆ نیشاندان لە ئایفۆن
            img.src = "https://images.weserv.nl/?url=" + encodeURIComponent(urlParams.get('img'));
            img.onload = () => {
                canvas.width = img.clientWidth;
                canvas.height = img.clientHeight;
            };
        }

        async function save() {
            if (pad.isEmpty()) return alert("تکایە ئیمزا بکە");
            
            const temp = document.createElement('canvas');
            const ctx = temp.getContext('2d');
            temp.width = img.naturalWidth;
            temp.height = img.naturalHeight;

            ctx.fillStyle = "white"; // ڕێگری لە ڕەشبوونی وێنە
            ctx.fillRect(0, 0, temp.width, temp.height);
            ctx.drawImage(img, 0, 0);
            ctx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, temp.width, temp.height);

            alert("خەریکی ناردنە...");
            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ type: "SAVE_FINAL", mergedImage: temp.toDataURL("image/jpeg", 0.3), invoiceNum: urlParams.get('num') })
            }).then(() => alert("سەرکەوتوو بوو!")).catch(() => alert("هەڵە لە ناردن"));
        }

        function clearPad() { pad.clear(); }
    </script>
</body>
</html>
